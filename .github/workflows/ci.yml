name: Cucumber UI Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser (chrome/firefox/edge)'
        required: true
        default: 'chrome'
      tags:
        description: 'Cucumber tags (@Smoke, @Regression, @Login)'
        required: true
        default: '@Smoke'

jobs:
  test:
    name: Run Automation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build Project
        run: mvn clean compile test-compile -q

      - name: Run Tests
        run: |
          mvn test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dtags="${{ github.event.inputs.tags || '@Smoke' }}" \
            -Dheadless=true \
            -Dmaven.test.failure.ignore=true

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            reports/
            test-output/
          retention-days: 30
