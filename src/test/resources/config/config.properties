# ============================================================
# CucumberUIFramework - Configuration Properties
# ============================================================

# Base URL - The Internet Herokuapp (purpose-built for automation)
base.url=https://the-internet.herokuapp.com

# Browser: chrome | firefox | edge
browser=chrome

# Headless mode: true | false
headless=false

# Implicit wait (seconds)
implicit.wait=10

# Explicit wait (seconds)
explicit.wait=20

# Page load timeout (seconds)
page.load.timeout=30

# Screenshots: on failure screenshot path
screenshot.path=reports/screenshots/

# Download directory
download.dir=downloads/

# Excel test data file path
test.data.file=src/test/resources/config/TestData.xlsx

# Extent Report output path
extent.report.path=reports/extent/

# TestNG Report path
testng.report.path=reports/testng/

# Parallel threads
thread.count=2
